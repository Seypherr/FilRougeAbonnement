services:
  postgres:
    image: postgres:16-alpine
    container_name: subscription-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: subscription_user
      POSTGRES_PASSWORD: subscription_password
      POSTGRES_DB: subscription_manager
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscription_user -d subscription_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

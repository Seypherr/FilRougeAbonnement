services:
  - type: web
    name: subscription-manager-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm run render:build:backend
    initialDeployHook: npm run render:seed
    startCommand: npm run render:start:backend
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://subscription-manager-frontend.onrender.com
      - key: CLIENT_ORIGINS
        value: https://subscription-manager-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: subscription-manager-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_NAME
        value: subscription_manager_token
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: CSRF_COOKIE_NAME
        value: subscription_manager_csrf
      - key: CSRF_HEADER_NAME
        value: x-csrf-token
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Subscription Manager <onboarding@resend.dev>
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: AUTH_RATE_LIMIT_MAX
        value: "10"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Admin Subscription

  - type: web
    name: subscription-manager-frontend
    runtime: static
    buildCommand: npm run render:build:frontend
    staticPublishPath: ./frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://subscription-manager-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: subscription-manager-db
    region: frankfurt
    plan: free
    databaseName: subscription_manager
    user: subscription_user
    postgresMajorVersion: "17"
